<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legislação PMMG | ROTA PMMG</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .direito-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            min-height: 90vh;
        }

        .sidebar-legislacao {
            background: #161d2f;
            padding: 30px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .lista-leis { list-style: none; margin-top: 20px; }
        .lista-leis li {
            padding: 15px;
            background: #0b0f1a;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.3s;
        }

        .lista-leis li.ativo { border-color: #4ade80; color: #4ade80; }

        /* Área do PDF */
        .pdf-viewer-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .pdf-frame {
            width: 100%;
            height: 700px; /* Altura boa para leitura */
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0b0f1a;
        }

        .controles-pdf {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <header>
        <nav class="container">
            <div class="logo">ROTA <span>PMMG</span></div>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <div class="direito-container">
        <aside class="sidebar-legislacao">
    <h3>📖 Legislação</h3>
    <ul class="lista-leis">
        <li class="ativo" onclick="mudarConteudo('Docs/constituicao.pdf', 'Direito Constitucional', 'V9shT99u_YI')">
            Direito Constitucional
        </li>
        <li onclick="mudarConteudo('Docs/Limdb', 'LINDB', 'ypNuEbiWysw')">LINDB</li>
        </li>
    </ul>
</aside>

<main class="pdf-viewer-container">
    <div class="controles-pdf">
        <h2 id="titulo-lei">Direito Constitucional</h2>
        <a id="link-download" href="Docs/constituicao.pdf" download class="btn btn-secondary">Baixar PDF 📥</a>
    </div>

    <iframe id="pdf-frame" src="Docs/constituicao.pdf" class="pdf-frame"></iframe>
    
    <div class="video-aulas" style="margin-top: 40px;">
        <h3>📺 Videoaula de Apoio</h3>
        <div class="video-container">
            <iframe id="video-frame" 
                width="100%" 
                height="315" 
                src="https://www.youtube.com/embed/ypNuEbiWysw" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </div>
</main>
    </div>

    <script>
       function mudarConteudo(caminhoArquivo, titulo, idVideo) {
    const frame = document.getElementById('pdf-frame');
    const video = document.getElementById('video-frame');
    const linkDownload = document.getElementById('link-download');
    
    frame.src = caminhoArquivo;
    video.src = "https://www.youtube.com/embed/" + idVideo;
    document.getElementById('titulo-lei').innerText = titulo;
    linkDownload.href = caminhoArquivo;

    const itens = document.querySelectorAll('.lista-leis li');
    itens.forEach(i => i.classList.remove('ativo'));
    event.currentTarget.classList.add('ativo');
}
    </script>
</body>
</html>
